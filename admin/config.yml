backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  - name: "settings"
    label: "Site Settings"
    files:

      - name: "bio"
        label: "Bio & Links"
        file: "_data/bio.json"
        fields:
          - { label: "Band Name", name: "band_name", widget: "string", default: "Talkhouse" }
          - label: "Bio Paragraphs"
            name: "paragraphs"
            widget: "list"
            field: { label: "Paragraph", name: "text", widget: "text" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "Spotify URL", name: "spotify", widget: "string", required: false }
              - { label: "Bandcamp URL", name: "bandcamp", widget: "string", required: false }
              - { label: "Apple Music URL", name: "apple_music", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
              - { label: "Contact Email", name: "email", widget: "string", required: false }

      - name: "music"
        label: "Music"
        file: "_data/music.json"
        fields:
          - { label: "YouTube Video ID", name: "video_id", widget: "string", required: false, hint: "Paste just the ID from the YouTube URL, e.g. dQw4w9WgXcQ" }
          - label: "Albums / Releases"
            name: "albums"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "number" }
              - { label: "Format", name: "format", widget: "string", hint: "e.g. CD / Cassette / Digital" }
              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - { label: "Coming Soon", value: "coming-soon" }
                  - { label: "Out Now", value: "out" }
              - { label: "Stream Link", name: "link", widget: "string", required: false }

      - name: "hero"
        label: "Hero Photos"
        file: "_data/hero.json"
        fields:
          - label: "Slideshow Photos"
            name: "slides"
            widget: "list"
            field: { label: "Image", name: "image", widget: "image" }

  - name: "shows"
    label: "Shows"
    file: "_data/shows.json"
    fields:
      - label: "Shows"
        name: "shows"
        widget: "list"
        fields:
          - { label: "Date", name: "date", widget: "datetime", date_format: "MMM DD, YYYY", time_format: false }
          - { label: "Venue", name: "venue", widget: "string" }
          - { label: "City", name: "city", widget: "string" }
          - { label: "Tickets URL", name: "tickets_url", widget: "string", required: false }
          - label: "Status"
            name: "status"
            widget: "select"
            default: "live"
            options:
              - { label: "Live (visible on site)", value: "live" }
              - { label: "Draft (hidden)", value: "draft" }

  - name: "merch"
    label: "Merch"
    file: "_data/merch.json"
    fields:
      - label: "Merch Items"
        name: "items"
        widget: "list"
        fields:
          - { label: "Item Name", name: "name", widget: "string" }
          - { label: "Price", name: "price", widget: "number", value_type: "float", step: 0.01 }
          - label: "Category"
            name: "category"
            widget: "select"
            options:
              - { label: "Apparel", value: "apparel" }
              - { label: "Music", value: "music" }
              - { label: "Misc", value: "misc" }
          - { label: "Photo", name: "image", widget: "image", required: false }
          - { label: "Buy Link", name: "buy_link", widget: "string", required: false }
